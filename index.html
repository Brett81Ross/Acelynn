<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acelynn - Artist SPL Meter</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1a1a1e;
            --accent-green: #00e676;
            --accent-yellow: #ffd600;
            --accent-red: #ff1744;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 16px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 0.5px; }
        p.subtitle { color: #8a8a93; margin: 4px 0 0 0; font-size: 0.85rem; }

        .meter-card {
            background-color: var(--card-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            margin-bottom: 16px;
        }

        .db-display {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0;
            color: var(--accent-green);
            transition: color 0.2s ease;
        }

        .db-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #8a8a93;
            letter-spacing: 1px;
        }

        canvas {
            width: 100%;
            height: 140px;
            background-color: #0b0b0c;
            border-radius: 8px;
            margin-top: 16px;
        }

        .coach-card {
            background-color: var(--card-color);
            border-radius: 16px;
            padding: 20px;
            border-left: 6px solid var(--accent-green);
            transition: border-color 0.3s ease;
        }

        .coach-title {
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .coach-diagnosis { font-size: 0.95rem; margin-bottom: 12px; color: #e1e1e6; }
        .coach-suggestion { font-size: 0.9rem; color: #a1a1aa; padding-top: 8px; border-top: 1px solid #2e2e33; }

        .btn-prime {
            width: 100%;
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Acelynn</h1>
        <p class="subtitle">Real-time studio acoustic evaluator</p>
    </header>

    <button class="btn-prime" id="startBtn">Start Measurement</button>

    <div class="meter-card">
        <div class="db-label">Approximate Level</div>
        <div class="db-display" id="dbValue">00.0</div>
        <div class="db-label">dB SPL (Est.)</div>
        <canvas id="spectrumCanvas"></canvas>
    </div>

    <div class="coach-card" id="coachCard">
        <div class="coach-title" id="coachStatus" style="color: var(--accent-green);">System Ready</div>
        <div class="coach-diagnosis" id="coachDiag">Tap start to analyze your mixing environment.</div>
        <div class="coach-suggestion" id="coachSugg">Suggestions for speaker adjustment and EQ will appear here live.</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
