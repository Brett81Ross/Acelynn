<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachZero - AI Resale</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./acelynnpro.png">
    <meta name="theme-color" content="#00adb5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #0c0c0e; 
            color: #e2e8f0; 
            text-align: center; 
            padding: 20px; 
            line-height: 1.5; 
        }
        .logo-container {
            margin: 40px auto 20px auto;
            max-width: 160px;
        }
        .logo-img {
            width: 100%;
            height: auto;
            border-radius: 16px;
        }
        h1 { 
            color: #ffffff; 
            font-size: 28px;
            font-weight: 800; 
            margin-top: 10px;
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h1 span {
            color: #00adb5;
        }
        .subtitle {
            color: #94a3b8; 
            margin-bottom: 40px;
            font-size: 15px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }
        .button-group {
            background: #111115;
            border: 1px solid #1f1f24;
            padding: 24px;
            border-radius: 16px;
            max-width: 340px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        button { 
            padding: 16px; 
            font-size: 14px; 
            border: none; 
            color: white; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s; 
        }
        button:active {
            transform: scale(0.99);
        }
        #photo-btn { 
            background: #00adb5; 
            color: #0c0c0e;
        }
        #photo-btn:hover { 
            background: #00989e; 
        }
        #images-btn { 
            background: #1f242f; 
            color: #cbd5e1;
        }
        #images-btn:hover { 
            background: #181c26; 
        }
        .footer {
            margin-top: 80px;
            font-size: 11px;
            color: #475569;
            letter-spacing: 0.5px;
        }
        .footer-studio {
            margin-top: 4px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="./acelynnpro.png" alt="MachZero Logo" class="logo-img">
    </div>

    <h1>MACH<span>ZERO</span></h1>
    <p class="subtitle">Add multiple pictures to your batch to get a precise appraisal. Capture different details, close-ups of signatures, or angles of your item before analyzing.</p>

    <div class="button-group">
        <button id="photo-btn">TAKE A PHOTO</button>
        <button id="images-btn">CHOOSE IMAGES</button>
    </div>

    <div class="footer">
        <div>© 2026 MachZero™</div>
        <div class="footer-studio">Powered by CactusByte Studios • All Rights Reserved</div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
