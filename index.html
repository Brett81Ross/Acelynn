<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcoustiCoach Live</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        #coach-box { margin-top: 30px; padding: 20px; border-radius: 10px; background: #1e1e1e; border: 2px solid #333; }
        .WARNING { border-color: #ff9800 !important; color: #ff9800; }
        .CRITICAL { border-color: #f44336 !important; color: #f44336; }
        .BALANCED { border-color: #4caf50 !important; color: #4caf50; }
        button { padding: 12px 24px; font-size: 16px; background: #00adb5; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>AcoustiCoach</h1>
    <button id="start-btn">Start Mic Analysis</button>

    <div id="coach-box" class="BALANCED">
        <h2 id="status">Status: Ready</h2>
        <p id="diagnosis">Click start to analyze your room's sound balance.</p>
        <p><strong id="suggestion"></strong></p>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const diagnosisText = document.getElementById('diagnosis');
        const suggestionText = document.getElementById('suggestion');
        const coachBox = document.getElementById('coach-box');

        startBtn.addEventListener('click', async () => {
            // 1. Request access to the microphone
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            
            // 2. Create the Audio Analyzer
            const analyzer = audioContext.createAnalyser();
            analyzer.fftSize = 512; // Controls frequency resolution
            source.connect(analyzer);

            const bufferLength = analyzer.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            startBtn.style.display = 'none'; // Hide button once started
            statusText.innerText = "Status: Analyzing Live...";

            // 3. Loop the analysis in real-time
            function analyze() {
                analyzer.getByteFrequencyData(dataArray);

                // Group frequencies into Bass and Mid/High groups
                let lowEndEnergy = 0;
                let harshZoneEnergy = 0;

                // Simple bin approximations for 512 FFT size
                for(let i = 0; i < 10; i++) lowEndEnergy += dataArray[i]; // Low bass
                for(let i = 40; i < 80; i++) harshZoneEnergy += dataArray[i]; // ~2kHz - 4kHz harshness

                // 4. Evaluate the data and change UI
                if (lowEndEnergy > 2000) { 
                    updateUI("WARNING", "Muddy Low-End Buildup", "Your bass frequencies are overwhelming the space. Try backing away from walls or adding a high-pass filter.");
                } else if (harshZoneEnergy > 1800) {
                    updateUI("CRITICAL", "Harsh Presence Zone Peak", "Vocals or upper mids are piercing. Apply a slight EQ dip around 3 kHz.");
                } else {
                    updateUI("BALANCED", "Acoustically Balanced", "Frequency response looks smooth. Keep tracking!");
                }

                requestAnimationFrame(analyze);
            }
            analyze();
        });

        function updateUI(status, diagnosis, suggestion) {
            coachBox.className = status;
            statusText.innerText = `Status: ${status}`;
            diagnosisText.innerText = diagnosis;
            suggestionText.innerText = `Suggestion: ${suggestion}`;
        }
    </script>
</body>
</html>
