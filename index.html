<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachZero - AI Resale</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./acelynnpro.png">
    <meta name="theme-color" content="#00adb5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #0c0c0e; 
            color: #e2e8f0; 
            text-align: center; 
            padding: 20px; 
            line-height: 1.5; 
        }
        h1 { 
            color: #00adb5; 
            font-weight: 700; 
            margin-bottom: 5px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo-container {
            margin: 20px auto;
            max-width: 150px;
        }
        .subtitle {
            color: #94a3b8; 
            margin-top: 0; 
            font-size: 14px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        #appraisal-box { 
            margin-top: 25px; 
            padding: 25px; 
            border-radius: 12px; 
            background: #151518; 
            border: 2px solid #2d2d34; 
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 25px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }
        button { 
            padding: 14px 28px; 
            font-size: 15px; 
            border: none; 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s, transform 0.1s; 
        }
        button:active {
            transform: scale(0.98);
        }
        #photo-btn { background: #00adb5; width: 100%; max-width: 300px; }
        #photo-btn:hover { background: #008c92; }
        #images-btn { background: #1f2937; width: 100%; max-width: 300px; border: 1px solid #374151; }
        #images-btn:hover { background: #111827; }

        /* Dynamic Contextual Reverb Marketplace Card */
        #reverb-container { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 12px; 
            background: #1e120a; 
            border: 2px solid #ea580c; 
            text-align: left;
            display: none; /* Hidden by default */
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 20px rgba(234, 88, 12, 0.15);
        }
        #post-reverb-btn { 
            background: #ea580c; 
            width: 100%; 
            margin-top: 15px;
            padding: 12px;
        }
        #post-reverb-btn:hover { background: #c2410c; }
        
        .result-item {
            margin-bottom: 12px;
            font-size: 15px;
        }
        .label { color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 12px; display: block; }
        .value { color: #f1f5f9; font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>

    <h1>MachZero</h1>
    <p class="subtitle">Instant valuation, dimensional diagnostics, and smart marketplace integrations.</p>

    <div class="controls">
        <button id="photo-btn">TAKE A PHOTO</button>
        <button id="images-btn">CHOOSE IMAGES</button>
    </div>

    <!-- Core Appraisal Result Window -->
    <div id="appraisal-box">
        <h2 style="color: #00adb5; margin-top: 0; font-size: 18px; border-bottom: 1px solid #2d2d34; padding-bottom: 10px;">📋 Appraisal Diagnosis</h2>
        <div id="appraisal-details">
            <p style="color: #64748b; font-style: italic; text-align: center; margin: 20px 0;">Awaiting scan. Take a photo or upload an image to evaluate assets.</p>
        </div>
    </div>

    <!-- Hidden Contextual Reverb Portal: Only shows if item is an instrument -->
    <div id="reverb-container">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">🎸</span>
            <div>
                <h3 style="color: #ea580c; margin: 0; font-size: 16px; font-weight: bold;">Musical Equipment Identified</h3>
                <p style="margin: 2px 0 0 0; font-size: 13px; color: #94a3b8;">MachZero detected gear. You can push this straight to your store drafts.</p>
            </div>
        </div>
        <button id="post-reverb-btn">SEND DRAFT TO REVERB.COM</button>
    </div>

    <!-- Include your script file -->
    <script src="./app.js"></script>
</body>
</html>
