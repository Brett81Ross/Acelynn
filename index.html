<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acelynn Pro Audio Suite</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-color: #1f2833;
            --accent-green: #45f3ff;
            --accent-yellow: #fbd46d;
            --accent-red: #ff4a5a;
            --text-main: #c5c6c7;
            --text-bright: #ffffff;
        }

        body {
            margin: 0;
            padding: 16px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.8rem; color: var(--text-bright); letter-spacing: 1px; }
        p.subtitle { color: #66fcf1; margin: 4px 0 0 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .btn-prime {
            width: 100%; background-color: #1f2833; color: #66fcf1; border: 2px solid #66fcf1;
            padding: 14px; border-radius: 8px; font-weight: 600; font-size: 1rem; margin-bottom: 12px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-prime:hover { background-color: #66fcf1; color: #0b0c10; }

        .btn-sweep {
            width: 100%; background-color: #45f3ff; color: #0b0c10; border: none;
            padding: 12px; border-radius: 8px; font-weight: 700; font-size: 0.95rem; margin-bottom: 16px;
            cursor: pointer; display: none; text-transform: uppercase;
        }

        .meter-card {
            background-color: var(--card-color); border-radius: 12px; padding: 20px;
            text-align: center; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .db-display { font-size: 4.5rem; font-weight: 800; line-height: 1; margin: 5px 0; color: var(--accent-green); }
        .db-label { font-size: 0.75rem; text-transform: uppercase; color: #a1a1aa; letter-spacing: 1.5px; }

        /* --- HALVED STATUS BOX DESIGN --- */
        .status-box-halved {
            background-color: transparent; border: 2px solid var(--accent-green); border-radius: 12px;
            padding: 16px; margin-bottom: 16px; display: flex; flex-direction: row; gap: 16px; min-height: 140px;
            align-items: center; transition: border-color 0.3s ease;
        }
        .status-text-side { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .status-eq-side { flex: 1; width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; }
        
        .status-heading { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; color: var(--accent-green); }
        .status-desc { font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; color: var(--text-bright); }
        .status-suggestion-text { font-size: 0.8rem; line-height: 1.3; color: #a1a1aa; }
        
        #eqCanvas { width: 100%; height: 100%; background-color: #0b0b0c; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }

        .metrics-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;
        }
        .metric-tile {
            background-color: var(--card-color); border-radius: 8px; padding: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .metric-val { font-size: 1.4rem; font-weight: 700; color: var(--text-bright); margin-top: 4px; }
        .metric-lbl { font-size: 0.7rem; color: #a1a1aa; text-transform: uppercase; }

        canvas#spectrumCanvas { width: 100%; height: 80px; background-color: #0b0b0c; border-radius: 6px; margin-top: 12px; }

        .section-title {
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #66fcf1; margin-bottom: 10px; padding-left: 4px;
        }
        .log-container {
            display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-bottom: 40px;
        }
        
        .log-item {
            background-color: var(--card-color); border-radius: 10px; padding: 16px;
            border-left: 6px solid var(--accent-green); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease-out;
        }
        .log-time { font-size: 0.7rem; color: #a1a1aa; float: right; font-weight: bold; }
        .log-title { font-weight: 700; font-size: 0.95rem; text-transform: uppercase; margin-bottom: 6px; }
        .log-diagnosis { font-size: 0.9rem; margin-bottom: 8px; color: var(--text-bright); line-height: 1.3; }
        .log-suggestion { font-size: 0.85rem; color: #a1a1aa; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 480px) {
            .status-box-halved { flex-direction: column; align-items: stretch; }
            .status-eq-side { height: 90px; }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Acelynn Pro</h1>
        <p class="subtitle">Acoustic Reference Measurement Suite</p>
    </header>

    <button class="btn-prime" id="startBtn">Initialize Calibration Suite</button>
    <button class="btn-sweep" id="sweepBtn">Run Room Response Sweep (20Hz-20kHz)</button>

    <div class="status-box-halved" id="statusBoxContainer">
        <div class="status-text-side">
            <div class="status-heading" id="liveStatusTitle">Status: Ready</div>
            <div class="status-desc" id="liveStatusDiag">Engine Idle</div>
            <div class="status-suggestion-text" id="liveStatusSugg">Boot up core diagnostic metrics to engage active environment tracking maps.</div>
        </div>
        <div class="status-eq-side">
            <canvas id="eqCanvas"></canvas>
        </div>
    </div>

    <div class="meter-card">
        <div class="db-label">Linear Reference Tracker</div>
        <div class="db-display" id="dbValue">00.0</div>
        <div class="db-label">ECM Emulated dB SPL</div>
        <canvas id="spectrumCanvas"></canvas>
    </div>

    <div class="metrics-grid">
        <div class="metric-tile">
            <div class="metric-lbl">LUFS Equivalent</div>
            <div class="metric-val" id="lufsVal">-Inf</div>
        </div>
